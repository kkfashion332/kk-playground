<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adept Play - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white select-none overflow-hidden h-screen font-sans">

    <div class="max-w-md mx-auto bg-gray-900 h-full flex flex-col relative shadow-2xl">
        
        <div class="p-6 text-center pt-12">
            <h1 class="text-4xl font-bold text-green-500 tracking-wider">ADEPT <span class="text-white">PLAY</span></h1>
            <p class="text-gray-400 mt-2 text-sm">Compete, Win & Earn Real Cash</p>
        </div>

        <div class="flex border-b border-gray-700 mt-6">
            <button onclick="switchTab('loginForm', 'auth-tab', 'auth-btn', 'text-green-500 border-green-500 border-b-2')" class="auth-btn flex-1 py-3 text-center text-green-500 border-b-2 border-green-500 font-semibold transition">Login</button>
            <button onclick="switchTab('signupForm', 'auth-tab', 'auth-btn', 'text-green-500 border-green-500 border-b-2')" class="auth-btn flex-1 py-3 text-center text-gray-400 border-b-2 border-transparent font-semibold transition">Sign Up</button>
        </div>

        <div id="loginForm" class="auth-tab p-6 mt-4">
            <form onsubmit="event.preventDefault(); window.location.href='index.html';">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Email or Username</label>
                    <input type="text" class="w-full bg-gray-800 text-white rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="Enter email" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-400 text-sm mb-2">Password</label>
                    <input type="password" class="w-full bg-gray-800 text-white rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="Enter password" required>
                </div>
                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg shadow-lg transition">Login Now</button>
            </form>
        </div>

        <div id="signupForm" class="auth-tab p-6 mt-4 hidden">
            <form onsubmit="event.preventDefault(); alert('Connect Firebase to register!');">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Username</label>
                    <input type="text" class="w-full bg-gray-800 text-white rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="Player name" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Email</label>
                    <input type="email" class="w-full bg-gray-800 text-white rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="Enter email" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-400 text-sm mb-2">Password</label>
                    <input type="password" class="w-full bg-gray-800 text-white rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="Create password" required>
                </div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg shadow-lg transition">Create Account</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
