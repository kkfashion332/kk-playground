<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adept Play - Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white select-none h-screen overflow-hidden font-sans">

    <div class="max-w-md mx-auto bg-gray-900 h-full flex flex-col relative shadow-2xl">
        
        <header class="bg-gray-800 p-4 text-center shadow-md z-10 border-b border-gray-700">
            <h1 class="text-lg font-bold">My Wallet</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-20">
            <div class="bg-gradient-to-r from-green-600 to-green-500 rounded-2xl p-6 text-center shadow-lg relative overflow-hidden mb-6">
                <i class="fa-solid fa-coins absolute -right-4 -bottom-4 text-6xl text-white opacity-20"></i>
                <p class="text-green-100 text-sm font-medium">Total Balance</p>
                <h2 class="text-4xl font-bold mt-2 mb-4">₹150.00</h2>
                
                <div class="flex gap-3 mt-4 relative z-10">
                    <button class="flex-1 bg-white text-green-600 font-bold py-2 rounded-lg shadow hover:bg-gray-100 transition">
                        <i class="fa-solid fa-plus-circle mr-1"></i> Add
                    </button>
                    <button class="flex-1 bg-gray-900/40 text-white border border-white/30 font-bold py-2 rounded-lg hover:bg-gray-900/60 transition">
                        <i class="fa-solid fa-building-columns mr-1"></i> Withdraw
                    </button>
                </div>
            </div>

            <h3 class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-wider">Recent Transactions</h3>
            
            <div class="space-y-3">
                <div class="bg-gray-800 p-3 rounded-lg border border-gray-700 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="bg-green-500/20 text-green-400 p-2 rounded-full h-10 w-10 flex items-center justify-center">
                            <i class="fa-solid fa-trophy"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm">Won FF Match #102</p>
                            <p class="text-xs text-gray-400">Today, 10:30 AM</p>
                        </div>
                    </div>
                    <span class="text-green-400 font-bold">+ ₹50</span>
                </div>

                <div class="bg-gray-800 p-3 rounded-lg border border-gray-700 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="bg-red-500/20 text-red-400 p-2 rounded-full h-10 w-10 flex items-center justify-center">
                            <i class="fa-solid fa-gamepad"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm">Entry: BGMi Solo</p>
                            <p class="text-xs text-gray-400">Yesterday</p>
                        </div>
                    </div>
                    <span class="text-red-400 font-bold">- ₹20</span>
                </div>
            </div>
        </main>

        <nav class="bg-gray-800 border-t border-gray-700 absolute bottom-0 w-full z-10 flex justify-around p-3 pb-safe">
            <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-green-500 transition"><i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[10px]">Home</span></a>
             <a href="my_tournaments.html" class="flex flex-col items-center text-gray-400 hover:text-green-500 transition"><i class="fa-solid fa-gamepad text-xl mb-1"></i><span class="text-[10px]">My Matches</span></a>
             <a href="wallet.html" class="flex flex-col items-center text-green-500"><i class="fa-solid fa-wallet text-xl mb-1"></i><span class="text-[10px]">Wallet</span></a>
             <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-green-500 transition"><i class="fa-solid fa-user text-xl mb-1"></i><span class="text-[10px]">Profile</span></a>
        </nav>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
